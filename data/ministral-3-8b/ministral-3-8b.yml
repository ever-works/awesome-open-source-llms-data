markdown: >-
  ## Overview


  Ministral 3 8B provides excellent balance between capability and efficiency,
  making it ideal for local deployment scenarios.


  ## Architecture


  - **Parameters**: 8 billion

  - **Type**: Dense model

  - **Modality**: Native multimodal

  - **Languages**: Dozens supported


  ## Variants


  - **Base**: Foundation

  - **Instruct**: Chat-optimized

  - **Reasoning**: Extended thinking


  ## Performance


  - Matches larger models

  - Produces fewer tokens

  - Excellent efficiency

  - Strong instruction following


  ## Deployment


  - Single GPU inference

  - Consumer hardware compatible

  - Quantization friendly

  - Fast inference


  ## Use Cases


  - Local deployment

  - Production inference

  - Consumer devices

  - Real-time applications


