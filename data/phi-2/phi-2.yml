markdown: >-
  ## Overview


  Phi-2 is a Transformer-based language model developed by Microsoft with 2.7
  billion parameters. It demonstrates that smaller, efficiently trained models
  can achieve performance comparable to much larger models.


  ## Architecture


  - **Parameters**: 2.7 billion

  - **Architecture**: Transformer

  - **Training Data**: 1.4 trillion tokens of synthetic data

  - **Data Source**: Generated from GPT-3.5-turbo


  ## Performance


  Despite its compact size, Phi-2 competes with models up to 25 times larger,
  demonstrating the power of high-quality training data and efficient
  architecture design.


  ## Key Features


  - **Efficiency**: Runs on modest hardware due to small parameter count

  - **Synthetic Data Training**: Trained on high-quality synthetic data

  - **Strong Performance**: Punches above its weight class

  - **Local Deployment**: Suitable for edge and local inference


  ## Use Cases


  - Resource-constrained environments

  - Edge deployment

  - Local inference on consumer hardware

  - Development and prototyping

  - Applications requiring fast inference


  ## Training Approach


  Phi-2's training approach emphasizes data quality over quantity, using
  synthetic data generated from GPT-3.5-turbo to create a high-signal training
  corpus.


  ## Licensing


  Available under Microsoft's research license.


  ## Pricing


  Free and open-source.
