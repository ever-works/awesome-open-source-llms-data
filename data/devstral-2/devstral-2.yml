  software engineering tasks and multi-file codebase operations.


  ## Specifications


  | Attribute | Value |

  |---|---|

  | Parameters | 123B (dense) |

  | Context Window | 256,000 tokens |


  ## Benchmarks


  - 72.2% SWE-bench Verified — top of open-weight leaderboard

  - Beats DeepSeek V3.2 head-to-head on agentic coding tasks in 42.8% of
  evaluations


  ## Features


  - Purpose-built for multi-file edits, codebase exploration, and long-horizon
  software engineering

  - Ships with Mistral Vibe CLI for terminal-native use

  - Apache 2.0 license
