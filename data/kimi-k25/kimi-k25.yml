markdown: >
  ## Overview

  Kimi K2.5, developed by Moonshot, is a frontier-level open-source large
  language model known for its exceptional benchmark performance across various
  domains. With 1 trillion parameters (32B active per token) and a
  Mixture-of-Experts (MoE) architecture, it offers high efficiency and powerful
  capabilities.


  ## Capabilities

  *   **Coding:** Achieves a near-perfect HumanEval score of 99.0, making it the
  highest-performing model in coding evaluation.

  *   **Mathematical Reasoning:** Leads in MATH-500 with a score of 98.0 and
  performs strongly in AIME 2025 (96.1).

  *   **General Reasoning:** Excels in MMLU (92.0) and GPQA Diamond (87.6),
  demonstrating superior general knowledge and scientific reasoning.

  *   **Instruction Adherence:** Leads IFEval with a score of 94.0, indicating
  precise and reliable adherence to complex prompts.

  *   **Context Window:** Boasts a 262K context window, enabling it to handle
  extremely long and intricate inputs.

  *   **Chatbot Arena:** Holds a high Chatbot Arena rating of 1447, signifying
  strong human preference for its conversational quality.


  ## Best For

  *   Any task requiring top-tier coding, math, reasoning, or instruction
  adherence

  *   Multi-domain AI applications

  *   Complex problem-solving and nuanced understanding


  ## Benchmarks

  *   **MMLU:** 92.0

  *   **MMLU-Pro:** 87.1

  *   **HumanEval:** 99.0

  *   **SWE-bench Verified:** 76.8

  *   **LiveCodeBench:** 85.0

  *   **AIME 2025:** 96.1

  *   **GPQA Diamond:** 87.6

  *   **MATH-500:** 98.0

  *   **Chatbot Arena:** 1447

  *   **IFEval:** 94.0
