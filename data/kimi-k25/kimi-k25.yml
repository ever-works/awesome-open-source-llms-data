markdown: >-
  ## Overview


  Kimi K2.5 is a multimodal mixture-of-experts model for agentic workflows,
  combining vision and language understanding with coordinated multi-agent
  execution. It is trained on a large corpus of mixed visual and text data and
  supports both fast responses and deeper reasoning modes. The model is intended
  to handle complex workflows by decomposing tasks and executing them across
  multiple agents.


  ## Features


  - Native multimodality: Trained on joint vision and text data for cross-modal
  reasoning and visual grounding

  - Agent swarm execution: Decomposes tasks into parallel subtasks handled by
  coordinated agents

  - Dual interaction modes: Supports both fast responses and step-by-step
  reasoning depending on task needs

  - Large context window: Handles up to 256K tokens for long interactions and
  documents

  - Tool and coding integration: Generates code from visual inputs and
  orchestrates tools for complex workflows


  ## Pricing


  Free and open-source under the Modified MIT license.
