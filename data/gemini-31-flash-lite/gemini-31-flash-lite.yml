markdown: >-
  ## Overview


  Gemini 3.1 Flash-Lite is the fastest and most cost-efficient model in the
  Gemini 3 family, designed for high-volume production workloads.


  ## Specifications


  | Attribute | Value |

  |---|---|

  | Parameters | Not disclosed |

  | Context Window | 1,000,000 tokens |

  | Max Output | 64,000 tokens |

  | Knowledge Cutoff | Jan 2025 |


  ## Benchmarks


  - 86.9% GPQA Diamond

  - 76.8% MMMU Pro


  ## Features


  - 2.5x faster Time to First Token vs. 2.5 Flash

  - 45% faster output than 2.5 Flash

  - Surpasses prior-gen Gemini 2.5 Flash despite smaller size

  - Thinking levels built in

  - Ideal for high-volume translation, content moderation, real-time interfaces

  - Multimodal


  ## Pricing


  $0.25 per M input tokens / $1.50 per M output tokens.
