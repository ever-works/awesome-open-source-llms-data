name: Phi-4-mini-instruct
description: Phi-4 Mini Instruct is Microsoft's compact instruction-tuned
  language model, leveraging high-quality synthetic data to deliver strong
  reasoning and code capabilities far exceeding its parameter count. It uses
  novel training techniques inspired by the Phi family to maximize capability
  per parameter. Ideal for edge deployment, mobile inference, and scenarios
  where model size and memory are constrained, it competes favorably with
  7B-level models despite being much smaller.
