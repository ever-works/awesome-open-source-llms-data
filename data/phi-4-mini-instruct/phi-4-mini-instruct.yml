name: Phi-4-mini-instruct
description: Phi-4-mini-instruct is a lightweight, instruction-tuned model from
  Microsoft's Phi-4 family. It is trained on a mix of high-quality synthetic
  data and carefully filtered public datasets, with a strong emphasis on
  reasoning-dense content. With only 3.8B parameters, Phi-4-mini-instruct shows
  reasoning and multilingual performance comparable to much larger models in the
