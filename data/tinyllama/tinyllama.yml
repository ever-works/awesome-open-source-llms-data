name: TinyLlama
description: TinyLlama is a 1.1B parameter open-source language model
  pre-trained on 3 trillion tokens using the same architecture and tokenizer as
  the LLaMA family. Despite its small size, it demonstrates surprisingly capable
  language understanding and generation, making it ideal for experimentation and
  resource-constrained deployments. Its fully open training methodology and
  minimal compute requirements ($50K vs millions for larger models) democratize
  access to language model training.
source_url: https://github.com/jzhang38/TinyLlama
category: Small Language Models
