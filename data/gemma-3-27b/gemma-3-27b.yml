markdown: >-
  ## Overview

  Gemma 3 27B is an open-source large language model from Google, designed for
  efficiency and performance in resource-constrained environments.


  ## Features

  - **Parameters:** 27B (smallest model on the leaderboard).

  - **MMLU-Pro Score:** 67.5.


  ## Best for

  - Teams operating without access to multi-GPU infrastructure.

  - Resource-constrained deployments.


  ## Benchmarks

  - MMLU-Pro: 67.5

  - LiveCodeBench: 29.7

  - GPQA Diamond: 42.4

  - Chatbot Arena: 1365
