markdown: >-
  ## Overview


  Qwen3-Embedding-0.6B is a text embedding model from the latest Qwen3 embedding
  series, built on the Qwen3 foundation model family. It is designed
  specifically for tasks such as semantic search, reranking, clustering, and
  classification. The Qwen3 embedding family also includes 4B and 8B variants
  for higher performance.


  ## Features


  - **Multilingual support**: Supports over 100 natural and programming
  languages, with strong performance on Chinese and English as reflected in MTEB
  and C-MTEB evaluations

  - **Instruction-aware architecture**: Supports user-defined instructions for
  embedding and reranking, yielding typical improvements of 1% to 5% over
  non-instructed usage

  - **Flexible embedding dimensions**: Supports user-defined output dimensions
  ranging from 32 to 1024, optimized for different resource constraints

  - **Reranking integration**: Can be seamlessly integrated with its reranker
  counterpart for full-stack semantic search systems


  ## Usage Considerations


  - Prompt engineering matters: structured task instructions (e.g., `Instruct:
  <task>\nQuery: <query>`) should be included to avoid performance drops

  - The model requires proper instruction formatting for optimal retrieval
  performance


  ## Deployment


  - Available on Hugging Face

  - Can be deployed with BentoML for scalable API serving

  - Suitable for cloud and self-hosted deployment
