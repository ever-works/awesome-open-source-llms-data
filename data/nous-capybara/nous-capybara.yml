markdown: >-
  ## Overview


  Nous Capybara is a multi-turn conversational model from Nous Research designed
  for extended context and improved dialogue coherence. It excels at maintaining
  context across long conversations.


  ## Model Variants


  ### Capybara 34B

  - **Base**: Yi 34B or similar

  - **Context**: Extended support

  - **Performance**: High-quality conversations


  ### Capybara 7B

  - **Base**: Mistral 7B or Llama 2 7B

  - **Size**: Efficient deployment

  - **Quality**: Strong for compact size


  ### Capybara 13B

  - **Base**: Llama 2 13B

  - **Balance**: Performance and efficiency


  ## Key Features


  - **Multi-Turn Excellence**: Superior dialogue handling

  - **Extended Context**: Long conversation support

  - **Coherence**: Maintains topic consistency

  - **Context Retention**: Remembers conversation history

  - **High-Quality Data**: Curated training examples

  - **Open Source**: Freely available


  ## Training Approach


  ### Multi-Turn Dataset

  - **High-Quality Conversations**: Curated dialogues

  - **Extended Interactions**: Long conversation examples

  - **Context Dependencies**: Multi-turn reasoning

  - **Diverse Topics**: Broad coverage

  - **Natural Flow**: Realistic conversations


  ### Training Focus

  - Multi-turn understanding

  - Context retention

  - Coherent responses

  - Topic consistency

  - Natural progression


