markdown: >-
  ## Overview


  QwQ-32B is Alibaba's compact reasoning model released on March 5, 2025.
  Specializing in complex problem-solving, it delivers frontier reasoning
  capabilities while requiring dramatically less computational power than larger
  competitors.


  ## Key Achievement


  Achieves performance comparable to DeepSeek-R1 (671B parameters) with only 32
  billion parameters, representing a 20x efficiency advantage.


  ## Technical Specifications


  - Parameters: 32 billion

  - Context Window: 131,072 tokens (approximately 300 pages of text)

  - Architecture: Optimized for reasoning workloads

  - Training: Multi-stage reinforcement learning


  ## Focus Areas


  Primary focus on:

  - Logical reasoning and structured thinking

  - Mathematical problem-solving

  - Code generation and programming tasks

  - Multi-step task decomposition


  ## Performance Benchmarks


  Excels across multiple reasoning benchmarks:

  - AIME 24: Advanced mathematical reasoning

  - Live CodeBench: Coding proficiency

  - LiveBench: Objective evaluation

  - IFEval: Instruction-following ability

  - BFCL: Tool and function-calling capabilities


  ## Training Approach


  Multi-stage reinforcement learning process that iteratively improves outputs,
  resulting in a model excelling in domains requiring structured thinking and
  systematic problem-solving.


  ## Licensing


  Available on Hugging Face and Model Scope under Apache 2.0 license for free
  download and use.
