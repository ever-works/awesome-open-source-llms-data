markdown: >-
  ## Overview


  DeepHermes-3 24B is Nous Research's Mistral-based variant of their toggle-on
  reasoning model. At 24 billion parameters, it provides a sweet spot between
  capability and efficiency.


  ## Model Specifications


  - **Parameters**: 24 billion

  - **Base**: Mistral 24B

  - **Architecture**: Enhanced with reasoning tuning

  - **Status**: Preview release


  ## Toggle-On Reasoning


  - System prompt-based mode switching

  - Extended thinking for complex tasks

  - Fast response mode for simple queries

  - Flexible reasoning depth


  ## Performance Profile


  - Strong general capabilities

  - Effective reasoning when enabled

  - Good instruction following

  - Balanced performance/speed


  ## Deployment Characteristics


  - Single high-end GPU compatible

  - Cloud and on-premises deployment

  - Good inference speed

  - Reasonable memory usage

  - Production-ready


  ## Use Cases


  - Production inference

  - Research applications

  - Complex reasoning tasks

  - General-purpose chat

  - Code generation

  - Analysis and writing


  ## Advantage Over Llama Base


  Mistral base provides:

  - Efficient architecture

  - Better inference speed

  - Proven performance

  - Community support


  ## Licensing


  Mistral-based, no commercial restrictions on organizational size.


  ## Inference Options


  - vLLM

  - SGLang

  - Other compatible engines

  - API deployment

  - Self-hosted


  ## Community


  Part of DeepHermes-3 family with complementary sizes and architectures.
