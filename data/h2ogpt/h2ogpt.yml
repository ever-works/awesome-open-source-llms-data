markdown: >-
  ## Overview

  h2oGPT provides complete transparency with an open license, making it
  particularly suitable for private deployments. It is often chosen by teams
  that handle sensitive data and require robust internal systems with full
  control over their information.


  ## Capabilities

  - **Open License**: Features a fully open license with no usage restrictions,
  offering users complete control over deployment and modifications.

  - **On-premise Deployment**: Can be run entirely on your own servers, ensuring
  complete data control and helping meet stringent security and compliance
  requirements.

  - **Easy Fine-tuning**: Offers straightforward processes for fine-tuning with
  your own datasets, which does not require deep technical expertise.


  ## Use Cases

  - Internal systems for organizations with strict data privacy needs.

  - Applications requiring full control over the LLM's deployment and
  modifications.

  - Customization with proprietary datasets without significant technical
  overhead.


  ## Hardware Considerations

  - Requires low to mid-range hardware, making it accessible for various setups
  while ensuring data control.
