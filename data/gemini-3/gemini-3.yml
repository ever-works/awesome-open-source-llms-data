markdown: >-
  ## Overview


  Gemini 3 stands out for UI-focused coding work. UI tasks are inherently
  multi-signal, requiring understanding of layout, spacing, interaction,
  accessibility, and visual intent. Gemini 3 demonstrates strong "UI brain"
  instincts, especially when paired with products that offer fast visual
  verification.


  ## Use Cases


  - UI design and layout work

  - Frontend component generation

  - Accessibility-aware coding

  - Visual intent translation to code

  - Design system alignment


  ## Strengths


  - Strong UI intuition

  - Multi-signal reasoning (layout, spacing, interaction)

  - Better than most models for visual correctness

  - Fast response times


  ## Weaknesses


  - Primarily optimized for UI work rather than deep backend reasoning

  - Works best when paired with a product providing visual verification
