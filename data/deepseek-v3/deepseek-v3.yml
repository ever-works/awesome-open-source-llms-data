markdown: >
  ## Overview


  DeepSeek-V3-0324 is a powerful MoE model with 671B total parameters and 131K
  context length. It utilizes reinforcement learning techniques from the
  DeepSeek-R1 training process, significantly enhancing performance on reasoning
  tasks, achieving scores surpassing GPT-4.5 on mathematics and coding
  evaluations. The model demonstrates notable improvements in tool invocation,
  role-playing, and casual conversation capabilities, making it ideal for
  diverse enterprise applications.


  ## Features


  - Mixture-of-Experts (MoE) architecture with 671B total parameters

  - 131K context length for handling complex enterprise documents

  - Reinforcement learning techniques from DeepSeek-R1 training process

  - Superior performance on reasoning tasks, surpassing GPT-4.5 in mathematics
  and coding benchmarks

  - Enhanced tool invocation capabilities

  - Improved role-playing and casual conversation abilities

  - Cost-efficient inference at scale due to MoE architecture


  ## Pricing


  - Output pricing: $1.13 per million tokens


  *All pricing is from SiliconFlow as mentioned in the source article.*
