  - Dedicated reasoning model with visible chain-of-thought

  - Significant leap over original R1 in reasoning quality

  - Best for math, logic, and code-heavy tasks

  - MIT License


  ## Pricing


  MIT License / $0.45 / $2.15 per M tokens (input/output)
