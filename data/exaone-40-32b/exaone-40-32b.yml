markdown: >-
  ## Overview


  EXAONE 4.0 32B is LG's 32B parameter open source language model, noted for
  strong reasoning capabilities. It sits in the medium-scale tier for
  self-hosting, offering a sweet spot between quality and compute cost.


  ## Benchmarks & Performance


  - Category: Reasoning-focused model

  - Positioned in the VRAM bracket of 24-48GB, suitable for A100/H100 or
  multi-GPU consumer setups


  ## Deployment


  - **VRAM Requirements**: 24-48GB

  - **Hardware**: Requires A100/H100 or multi-GPU consumer setup

  - **Frameworks**: Compatible with Ollama, vLLM, llama.cpp, and Text Generation
  Inference

  - **Quantization**: Supports GGUF quantization to reduce memory needs by
  50-75% with approximately 2% quality loss


  ## Licensing


  Released as an open source model, free to self-host and fine-tune for
  commercial use.
