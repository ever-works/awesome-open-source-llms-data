markdown: >-
  ## Overview


  Qwen3.5-0.8B is a lightweight multimodal model from Alibaba's Qwen family,
  released under the Apache 2.0 license. It combines a 0.8B causal language
  model with a vision encoder and supports both thinking and non-thinking modes.


  ## Architecture


  - 0.8B causal language model with integrated vision encoder

  - Supports both thinking and non-thinking inference modes

  - Native context window of up to 262K tokens

  - Trained to support 200+ languages and dialects


  ## Key Features


  - **Multimodal at small scale**: Handles text, images, and video in one
  compact model, practical for lightweight multimodal assistants, document
  understanding, screenshot Q&A, and simple video summarization

  - **Long context for small-footprint deployments**: Native support for up to
  262K tokens works well for long documents, long chat histories, and agent
  workflows

  - **Broad language coverage**: Benefits from Qwen3.5's training across 200+
  languages and dialects, ideal for on-device global products


  ## Limitations


  - More suitable for lightweight multimodal and general assistant tasks than
  for deep reasoning, complex coding, or high-stakes knowledge work

  - Thinking mode can be unstable — more prone to entering thinking loops than
  larger Qwen3.5 variants, requiring careful sampling tuning and guardrails


  ## Licensing


  Released under the Apache 2.0 license, allowing free commercial use and
  modification.


  ## Deployment


  Fits comfortably on a single GPU at this 0.8B scale, making it suitable for
  resource-constrained environments and on-device deployments.
