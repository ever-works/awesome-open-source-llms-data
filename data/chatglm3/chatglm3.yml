markdown: >-
  ## Overview


  ChatGLM3 is Zhipu AI's third-generation bilingual conversational language
  model, building on the success of ChatGLM and ChatGLM2. With enhanced
  capabilities, improved reasoning, and extended context support, ChatGLM3
  represents a significant advancement in Chinese-English bilingual AI and is
  widely used in China for conversational applications.


  ## Architecture


  - **Model Type:** GLM (General Language Model) architecture

  - **Languages:** Bilingual (Chinese and English)

  - **Model Sizes:** Various configurations (6B primary)

  - **Context Length:** Extended from previous versions

  - **Design:** Optimized for dialogue and reasoning


  ## Key Features


  - Strong bilingual capabilities (Chinese-English)

  - Enhanced conversational abilities

  - Improved reasoning and logic

  - Extended context window

  - Better instruction following

  - Tool use capabilities

  - Code generation support

  - Function calling


  ## GLM Series Evolution


  ### ChatGLM (First Generation)

  - Initial bilingual chat model

  - 6 billion parameters

  - Foundation for series

  - Strong Chinese performance


  ### ChatGLM2 (Second Generation)

  - Improved architecture

  - Better performance

  - Enhanced bilingual capabilities

  - Foundation for ChatGLM3


  ### ChatGLM3 (Current)

  - Latest generation

  - Significantly improved capabilities

  - Extended context

  - Advanced features


