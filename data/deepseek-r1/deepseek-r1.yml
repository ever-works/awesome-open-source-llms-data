markdown: >-
  ## Overview

  DeepSeek R1 is an A-tier open-source large language model from DeepSeek, which
  was influential in 2025 and remains powerful, especially for mathematical and
  general knowledge tasks.


  ## Features

  - **MATH-500 Score:** 97.3.

  - **MMLU Score:** 90.8.

  - **HumanEval Score:** 90.2.


  ## Best for

  - Mathematics

  - General reasoning

  - Workflows already integrated with the DeepSeek ecosystem


  ## Benchmarks

  - MMLU: 90.8

  - MMLU-Pro: 84.0

  - HumanEval: 90.2

  - LiveCodeBench: 65.9

  - AIME 2025: 87.5

  - GPQA Diamond: 71.5

  - MATH-500: 97.3

  - Chatbot Arena: 1398
