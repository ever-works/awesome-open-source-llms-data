name: LLaMA 2 (Meta)
description: LLaMA 2 is Meta's second-generation open-weights model family,
  trained on 2 trillion tokens with 7B, 13B, and 70B variants. It introduced
  chat-optimized versions with RLHF and safety training, becoming the backbone
  for many fine-tuned models and remaining a reliable foundation for custom
  fine-tuning and edge deployment. Though surpassed by LLaMA 3, its smaller
  parameter counts make it ideal for resource-constrained environments,
  competing with models like Mistral 7B as an early open-weight standard.
source_url: https://llama.meta.com/llama2/
