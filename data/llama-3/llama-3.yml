name: Llama 3
description: Meta's Llama 3 is a family of openly available large language
  models trained on over 15 trillion tokens, available in 8B, 70B, and 405B
  parameter sizes. It features state-of-the-art instruction following,
  multilingual support across 8+ languages, and a 128K context window, making it
  well-suited for chatbots, content generation, and enterprise applications. It
  competes with models like Qwen 3 and GPT-4o-mini in its size class, offering
  industry-leading performance for open-weight models.
source_url: https://llama.meta.com/
