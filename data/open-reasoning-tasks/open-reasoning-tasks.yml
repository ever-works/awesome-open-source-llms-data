markdown: >-
  ## Overview


  Open Reasoning Tasks is a comprehensive open-source repository maintained by
  Nous Research, providing standardized reasoning tasks and benchmarks for
  evaluating language models.


  ## Purpose


  - Benchmark reasoning capabilities

  - Train reasoning models

  - Evaluate model performance

  - Share methodology

  - Advance reasoning research


  ## Components


  - Diverse reasoning task collection

  - Standardized evaluation metrics

  - Training methodology

  - Reproducible benchmarks

  - Community contributions


  ## Methodology


  - Solving phase: Workers attempt problems

  - Self-assessment: Evaluate own solutions

  - Finalization: Choose best submission

  - Standardized metrics: Consistent evaluation


  ## Use Cases


  - Model development

  - Reasoning research

  - Benchmark evaluation

  - Task creation

  - Methodology study


  ## Licensing


  Apache 2.0 license for open use and modification.


  ## Community


  Open for contributions and collaboration in advancing reasoning capabilities
  of LLMs.
