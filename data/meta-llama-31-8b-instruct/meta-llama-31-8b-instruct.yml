markdown: >-
  ## Overview

  Meta Llama 3.1 is a family of multilingual large language models developed by
  Meta, featuring pretrained and instruction-tuned variants in 8B, 70B, and 405B
  parameter sizes. This 8B instruction-tuned model is optimized for multilingual
  dialogue use cases and outperforms many available open-source and closed chat
  models on common industry benchmarks. The model was trained on over 15
  trillion tokens of publicly available data, using techniques like supervised
  fine-tuning and reinforcement learning with human feedback to enhance
  helpfulness and safety. Llama 3.1 supports text and code generation, with a
  knowledge cutoff of December 2023.


  ## Features

  - Optimized for multilingual dialogue use cases

  - Outperforms many open-source and closed models on benchmarks

  - Trained on over 15 trillion tokens of data

  - Supports text and code generation

  - Enhanced helpfulness and safety through fine-tuning and reinforcement
  learning with human feedback


  ## Pricing

  $0.06/M Tokens (from comparison table)
