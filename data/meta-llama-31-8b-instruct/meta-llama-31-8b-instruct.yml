name: Meta-Llama-3.1-8B-Instruct
description: Meta-Llama-3.1-8B-Instruct is the instruction-tuned variant of
  Meta's 8B parameter model with 128K context window, tool use support, and
  improved safety alignment. It supports function calling, agent workflows, and
  multilingual capabilities across 8 languages. Optimized for production
  deployment, it delivers the highest quality-to-size ratio of any Meta model,
  making it the most popular foundation for fine-tuning and local inference.
