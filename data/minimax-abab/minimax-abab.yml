markdown: >-
  ## Overview


  MiniMax is a Chinese AI company and member of the "AI tigers" group, known for
  its ABAB series of foundation models. The company offers comprehensive
  multimodal AI capabilities including text, voice, and vision, serving both
  enterprise and consumer markets with strong commercial success in China.


  ## Key Features


  - Multimodal capabilities (text, voice, vision)

  - Strong commercial presence

  - ABAB model series

  - Enterprise and consumer focus

  - Chinese market leadership

  - Advanced AI applications


