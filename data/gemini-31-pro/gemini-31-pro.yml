markdown: >-
  ## Overview


  Gemini 3.1 Pro is Google DeepMind's current flagship model, succeeding Gemini
  3 Pro and demonstrating significant improvements across reasoning benchmarks.


  ## Specifications


  | Attribute | Value |

  |---|---|

  | Parameters | Not disclosed |

  | Context Window | 1,000,000 tokens |

  | Max Output | 64,000 tokens |

  | Knowledge Cutoff | Jan 2025 |


  ## Benchmarks


  - 77.1% ARC-AGI-2 (more than double Gemini 3 Pro's 31.1%)

  - 94.3% GPQA Diamond

  - 80.6% SWE-bench Verified

  - Leads on 12 of 18 tracked benchmarks


  ## Features


  - Adaptive thinking with low/medium/high levels

  - Improved agentic coding, finance, and spreadsheet performance vs. 3 Pro

  - Available via Gemini app, AI Studio, Vertex AI, NotebookLM

  - Multimodal (text, image, audio, video, code)


  ## Pricing


  $2.00 per M input tokens / $12.00 per M output tokens (2x pricing above 200K
  tokens).
