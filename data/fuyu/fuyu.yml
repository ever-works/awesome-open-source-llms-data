  ## Training Approach


  1. **Image Tokenization**: Convert images to patches

  2. **Unified Training**: Train single decoder

  3. **Multimodal Data**: Image-text pairs

  4. **Direct Processing**: No separate encoders

  5. **End-to-End**: Single model training


