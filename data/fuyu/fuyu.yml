markdown: >-
  ## Overview


  Fuyu is a multimodal model from Adept with a novel architecture that
  eliminates the traditional image encoding stage. Instead of using a separate
  vision encoder, Fuyu processes images directly alongside text tokens,
  resulting in a simpler and more flexible architecture.


  ## Model Specifications


  - **Parameters**: 8 billion

  - **Architecture**: Decoder-only (no separate vision encoder)

  - **Innovation**: Direct image token processing

  - **Modalities**: Vision and language


  ## Key Innovation


  **No Separate Vision Encoder**:

  - Images processed as token patches directly

  - No CLIP or vision transformer

  - Simpler architecture

  - Easier fine-tuning

  - More flexible for tasks


  ### Advantages

  - **Simplicity**: Fewer components

  - **Flexibility**: Easier adaptation

  - **Fine-tuning**: More straightforward

  - **Performance**: Competitive results

  - **Efficiency**: Direct processing


  ## Architecture Details


  ### Traditional VLM Architecture

  1. Vision encoder (CLIP, etc.)

  2. Projection layer

  3. Language model

  4. Complex integration


  ### Fuyu Architecture

  1. Image → token patches

  2. Process directly with text

  3. Single decoder

  4. Unified processing


  ## Key Features


  - **Novel Architecture**: No vision encoder

  - **Direct Processing**: Images as tokens

  - **Simple Design**: Fewer moving parts

  - **Easy Fine-Tuning**: Straightforward adaptation

  - **Multimodal**: Vision and language

  - **Open Source**: Freely available


