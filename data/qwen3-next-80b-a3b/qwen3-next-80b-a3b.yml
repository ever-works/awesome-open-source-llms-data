name: Qwen3-Next-80B-A3B
description: Qwen3 Next 80B A3B is an ultra-sparse mixture-of-experts model with
  only 3 billion active parameters from 80 billion total parameters, offering
  exceptional memory efficiency. Through knowledge distillation from larger
  teacher models, it delivers reasoning quality far exceeding its active
  parameter count. Designed for scenarios requiring high throughput with limited
  memory, it runs efficiently on single consumer GPUs.
