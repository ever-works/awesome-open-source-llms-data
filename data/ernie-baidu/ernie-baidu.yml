markdown: >-
  ## Overview


  Ernie is Baidu's large language model, powering the Ernie chatbot released in
  August 2023. The model has accumulated more than 45 million users. Baidu open
  sourced the Ernie 4.5 LLM series in 2025.


  ## Architecture


  Recent Ernie models (Ernie 4.5, Ernie X1) are based on a mixture-of-experts
  (MoE) architecture. Earlier rumors suggested parameter counts in the
  trillions, but actual parameter counts are in the billions.


  ## Model Versions


  - **Ernie 4.5** - Open source model, part of the Ernie 4.5 LLM series

  - **Ernie X1** - Recent iteration with improved capabilities


  ## Use Cases


  - Chinese and multilingual natural language processing

  - Chatbot applications

  - Enterprise AI deployments in Asian markets
