name: Ernie (Baidu)
description: ERNIE is Baidu's enterprise-grade large language model series,
  featuring strong Chinese language understanding and generation capabilities
  across multiple parameter scales. It incorporates knowledge graph enhancement
  for improved factual accuracy and domain-specific knowledge integration.
  Designed for Chinese enterprise applications including customer service,
  content creation, and intelligent search, competing with Alibaba's Qwen and
  China's other domestic LLMs.
