markdown: >-
  ## Overview


  Gemma 3 is Google's third-generation family of lightweight, state-of-the-art
  open models built from the same technology that powers the Gemini family of
  large language models. Gemma models are considered "lightweight" versions of
  Gemini, optimized for efficiency while maintaining high performance.


  ## Architecture


  - **Model Sizes:** 2B, 7B, 9B, 12B, and 27B parameters

  - **Base Technology:** Same foundation as Gemini models

  - **Design:** Optimized for low-latency, safe applications

  - **Training:** Advanced techniques from Google's research


  ## Key Features


  - State-of-the-art performance at smaller sizes

  - Efficient inference for resource-constrained scenarios

  - Built-in safety features and alignment

  - Strong multilingual capabilities

  - Optimized for both research and production

  - Compatible with standard frameworks


  ## Performance Highlights


  ### Gemma-3-27B

  - **Beats Gemini 1.5-Pro** across multiple benchmarks

  - Exceptional performance for its size class

  - Strong general knowledge and reasoning

  - Excellent coding capabilities


  ### Size-Specific Strengths

  - **2B:** Ultra-efficient for edge deployment

  - **7B:** Best balance of performance and efficiency

  - **9B:** Enhanced capabilities for specialized tasks

  - **12B:** Strong general-purpose performance (by size tier)

  - **27B:** Flagship model with top-tier results


  ### Benchmark Results

  - Exceptional results across all size categories

  - Outperforms larger open models in many tasks

  - Competitive with much larger proprietary models

  - Strong MMLU, coding, and reasoning scores


  ## Safety and Alignment


  - Built-in safety features from Google's research

  - Responsible AI considerations

  - Content filtering capabilities

  - Reduced risk of harmful outputs


  ## Deployment Options


  - Edge deployment for smaller variants (2B, 7B)

  - Cloud deployment for all sizes

  - Mobile and embedded systems (2B)

  - Standard server infrastructure (7B-27B)

  - GPU and TPU optimization

  - Compatible with Hugging Face, JAX, PyTorch


  ## Use Cases


  - Low-latency conversational AI

  - Edge and mobile applications

  - Research requiring smaller models

  - Educational applications

  - Cost-effective production deployments

  - Multilingual applications

  - Content generation with safety constraints


  ## Licensing Considerations


  **Important:** Gemma ships under **Google's Terms of Use** — not a traditional
  permissive open-source license.


  ### Key License Terms:

  - Google reserves the right to remotely restrict usage

  - License conditions propagate to models trained on Gemma's synthetic outputs

  - Commercial use allowed but with specific restrictions

  - Different terms than standard Apache 2.0 or MIT licenses


  ### Implications:

  - Review terms carefully for production use

  - Consider license propagation for derivative works

  - Understand usage restrictions and limitations


  ## Competitive Position


  Gemma 3 represents Google's "small language model" approach, focusing on
  efficiency and safety while leveraging world-class training infrastructure and
  techniques from the Gemini program.
