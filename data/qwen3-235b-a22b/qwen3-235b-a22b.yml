markdown: >-
  ## Overview


  Qwen3-235B-A22B is Alibaba's most advanced open-source language model,
  implementing a mixture-of-experts (MoE) architecture with intelligent
  parameter activation. The model features 235 billion total parameters with
  only 22 billion activated per forward pass.


  ## Hybrid Thinking Mode


  A unique capability allowing seamless switching between:

  - **Thinking Mode**: Complex logical reasoning, mathematics, and coding tasks

  - **Non-Thinking Mode**: Efficient general-purpose dialogue and fast responses


  This toggle ensures optimal performance across various scenarios without
  sacrificing speed.


  ## Technical Specifications


  - Context Length: 32,768 tokens natively, 131,072 with YaRN extension

  - Training Data: 36 trillion tokens (double that of Qwen2.5)

  - Architecture: MoE with intelligent activation patterns

  - Native Support: Model Context Protocol (MCP)

  - Function Calling: Advanced capabilities for agent-based tasks


  ## Language Support


  Supports 100+ languages with strong multilingual instruction following and
  translation capabilities.


  ## Performance


  Demonstrates significantly enhanced reasoning capabilities, surpassing both
  QwQ and Qwen2.5 models on mathematics, code generation, and commonsense
  reasoning tasks.


  ## Licensing


  Open-weighted under Apache 2.0 license.
