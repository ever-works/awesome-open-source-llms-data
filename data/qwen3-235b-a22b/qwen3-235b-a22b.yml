markdown: >
  ## Overview


  Qwen3-235B-A22B features a Mixture-of-Experts (MoE) architecture with 235B
  total parameters and 22B activated parameters. It uniquely supports seamless
  switching between thinking mode for complex logical reasoning and non-thinking
  mode for efficient dialogue. The model demonstrates enhanced reasoning
  capabilities, superior human preference alignment, excellent agent
  capabilities for tool integration, and supports over 100 languages with strong
  multilingual instruction following.


  ## Features


  - Mixture-of-Experts (MoE) architecture with 235B total parameters and 22B
  activated parameters

  - Dual-mode operation: seamless switching between thinking mode (for complex
  logical reasoning, math, and coding) and non-thinking mode (for efficient,
  general-purpose dialogue)

  - Enhanced reasoning capabilities

  - Superior human preference alignment in creative writing, role-playing, and
  multi-turn dialogues

  - Excellent agent capabilities for precise integration with external tools

  - Supports over 100 languages and dialects with strong multilingual
  instruction following and translation capabilities

  - 131K context length


  ## Pricing


  - Output pricing: $1.42 per million tokens


  *All pricing is from SiliconFlow as mentioned in the source article.*
