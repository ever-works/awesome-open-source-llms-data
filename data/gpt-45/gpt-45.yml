name: GPT-4.5
description: OpenAI's GPT-4.5 (Orion) features a 128,000-token context window
  with long-term memory for consistent, context-aware extended conversations. It
  achieved 85.1% on MMLU benchmarks and delivers more direct, conversational
  responses with a broader knowledge base that helps reduce hallucinations
  across diverse topics.
