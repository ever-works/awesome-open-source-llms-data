markdown: >-
  ## Overview


  GPT-4.5 (codenamed Orion) was released by OpenAI on February 27, 2025 as a
  significant upgrade over earlier GPT-4 iterations.


  ## Features


  - **128,000-token context window**: Enables long-term memory across extended
  conversations, maintaining consistency and context awareness

  - **Improved directness**: Delivers more concise, to-the-point responses
  compared to previous versions, reducing unnecessary verbosity

  - **Broader knowledge base**: Reduces hallucinations when discussing a wide
  range of topics

  - **Natural conversational style**: More human-like interaction quality;
  optimized for casual chats and quick content generation

  - **85.1% MMLU score**: Strong performance on major benchmarks for general
  knowledge and reasoning


  ## Performance


  - MMLU: 85.1%

  - 128K token memory window

  - Optimized for speed and directness over deep technical problem-solving


  ## Use Cases


  - Casual conversation and quick content generation

  - Broad-knowledge queries across diverse topics

  - Situations requiring concise, direct answers


  ## Limitations


  - Not always the best choice for deep technical problem-solving

  - Proprietary — cannot be fine-tuned or modified by users

  - Paid API access only
