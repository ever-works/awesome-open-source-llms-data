markdown: >-
  ## Overview


  ChatLaw is a domain-specific open-source language model fine-tuned for legal
  assistance tasks. Developed by Beijing University of Posts and
  Telecommunications and collaborating institutions, it provides specialized
  support for the Chinese legal system.


  ## Capabilities


  - Legal consultation and Q&A

  - Chinese legal document analysis

  - Case law reference and reasoning

  - Legal document drafting assistance

  - Multi-round legal dialogue


  ## Architecture


  - Fine-tuned variant based on existing open-source LLMs

  - Domain corpus: Chinese legal texts, judgments, regulations, and legal
  literature

  - Released with open weights


  ## Use Cases


  - Legal professionals seeking reference information

  - Law students and researchers

  - Public legal education and consultation

  - Law firm automation and document review


  ## Deployment


  - Open weights available for download

  - Can be deployed on local infrastructure for privacy-sensitive legal
  applications
