markdown: >-
  ## Overview


  MedGemma is a specialized variant of Google's Gemma model family, designed
  specifically for medical and biomedical applications. It combines medical text
  understanding with image comprehension.


  ## Specialization


  - Medical image analysis

  - Biomedical text understanding

  - Clinical knowledge

  - Healthcare application focus

  - Specialized training


  ## Capabilities


  - Medical image interpretation

  - Clinical text analysis

  - Biomedical literature understanding

  - Medical knowledge synthesis

  - Clinical decision support


  ## Use Cases


  - Medical research

  - Clinical applications

  - Healthcare AI

  - Biomedical document analysis

  - Medical education

  - Healthcare provider support


  ## Applications


  - Diagnostic assistance

  - Medical image analysis

  - Literature review automation

  - Clinical documentation

  - Research acceleration


  ## Licensing


  Open weights with responsible AI considerations for medical applications.


  ## Integration


  Part of Google's broader Gemma family with access to shared infrastructure and
  support.
