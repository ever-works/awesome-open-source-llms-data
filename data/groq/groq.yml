name: Groq
description: Groq is a high-performance AI inference hardware and cloud platform
  built around their custom Language Processing Unit (LPU) architecture. Unlike
  GPU-based inference, Groq's LPUs are designed specifically for sequential
  language model inference, delivering deterministic ultra-low latency with
  sub-150ms time-to-first-token and 500+ tokens per second. The platform
  supports popular open-source models including LLaMA, Mixtral, and Gemma
  families, making it ideal for real-time applications requiring minimal
  latency.
