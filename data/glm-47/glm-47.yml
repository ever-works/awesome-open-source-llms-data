markdown: >
  ## Overview

  GLM-4.7, developed by Zhipu AI, is a frontier-class open-source large language
  model that excels in various domains. It is recognized for its high
  performance across multiple benchmarks, making it a versatile choice for
  complex AI applications.


  ## Capabilities

  *   **Code Generation:** Achieves a HumanEval score of 94.2, indicating strong
  ability in generating and understanding code.

  *   **Mathematical Reasoning:** Scores 95.7 on AIME 2025, demonstrating
  advanced mathematical problem-solving skills.

  *   **Scientific Reasoning:** With a GPQA Diamond score of 85.7, it performs
  exceptionally well in doctoral-level scientific reasoning tasks.

  *   **Instruction Following:** Boasts an IFEval score of 88.0, showcasing its
  ability to follow complex instructions accurately.

  *   **Context Window:** Features a 200K context window, allowing it to process
  and generate long and complex texts.

  *   **Real-world Coding:** Achieves 84.9 on LiveCodeBench, highlighting its
  proficiency in competitive coding scenarios.


  ## Best For

  *   Coding agents

  *   Complex reasoning tasks

  *   Scientific Q&A

  *   Multi-turn instruction-following applications


  ## Benchmarks

  *   **MMLU:** 90.1

  *   **MMLU-Pro:** 84.3

  *   **HumanEval:** 94.2

  *   **SWE-bench Verified:** 73.8

  *   **LiveCodeBench:** 84.9

  *   **AIME 2025:** 95.7

  *   **GPQA Diamond:** 85.7

  *   **Chatbot Arena:** 1445

  *   **IFEval:** 88.0
