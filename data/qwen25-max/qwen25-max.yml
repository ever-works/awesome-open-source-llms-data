markdown: >-
  ## Overview


  Qwen2.5-Max has redefined the open-weights landscape with parameter scale
  exceeding 1 trillion via Mixture-of-Experts (MoE) architecture. It represents
  Alibaba Cloud's most advanced open-source language model.


  ## Architecture


  - **Total Parameters**: 1+ trillion (via MoE)

  - **Architecture**: Mixture-of-Experts

  - **Language Support**: 119 languages

  - **Model Sizes**: 4B to 235B parameters across the Qwen family


  ## Performance


  **Mathematical Reasoning**:

  - AIME25: 92.3% accuracy


  **Coding Performance**:

  - LiveCodeBench v6: 74.1%

  - Qwen3-Coder: 70.6% on SWE-Bench Verified


  **General Capabilities**:

  - Strong multilingual understanding across 119 languages

  - Excellent instruction-following

  - Advanced reasoning capabilities


  ## Qwen Family Models


  The Qwen ecosystem includes:

  - **Qwen2.5-Max**: Flagship trillion-parameter model

  - **Qwen3-Next**: Next generation foundation model

  - **Qwen3-Omni**: Multimodal variant

  - **Qwen3-Coder**: Specialized coding model

  - Models ranging from 4B to 235B parameters


  ## Key Features


  - Massive multilingual coverage (119 languages)

  - State-of-the-art reasoning and coding

  - Efficient MoE architecture

  - Comprehensive model family for different use cases

  - Strong performance on academic benchmarks


  ## Licensing


  Released under the Apache 2.0 license, allowing for commercial use.


  ## Pricing


  Free and open-source under Apache 2.0 License.
