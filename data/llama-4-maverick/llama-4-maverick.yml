markdown: >-
  ## Overview

  Llama 4 Maverick is an open-source large language model known for its
  exceptionally long context window.


  ## Features

  - **Context Window:** 1M tokens (joint-longest on the board).

  - **Parameters:** 400B.


  ## Best for

  - Tasks requiring extensive long-context understanding.


  ## Benchmarks

  - MMLU: 85.5

  - MMLU-Pro: 80.5

  - HumanEval: 62.0

  - LiveCodeBench: 43.4

  - GPQA Diamond: 69.8

  - Chatbot Arena: 1328
