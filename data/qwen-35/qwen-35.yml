markdown: >-
  ## Overview

  Qwen 3.5 is an excellent all-around performer, particularly strong in areas
  demanding accurate instruction following and deep scientific understanding. It
  sets a new bar for GPQA Diamond scores among listed models.


  ## Key Features

  *   **GPQA Diamond Score:** 88.4 (best of any model on the leaderboard)

  *   **IFEval Score:** 92.6 (exceptional instruction following with high
  fidelity)

  *   **LiveCodeBench Score:** 83.6

  *   **SWE-bench Verified Score:** 76.4

  *   **MMLU Score:** 88.5

  *   **MMLU-Pro Score:** 87.8

  *   **Parameters:** 397B (implied from context)


  ## Best For

  *   Scientific reasoning applications

  *   Complex instruction-following scenarios

  *   Multilingual workloads


  ## Pricing

  Open-source model; licensing details depend on specific release.
