  ## Capabilities


  - Advanced reasoning

  - Code generation

  - Strong instruction following

  - Multilingual support

  - Complex problem-solving


  ## Performance


  - Competitive benchmarks

  - Strong on reasoning tasks

  - Excellent coding performance

  - Reliable outputs


  ## Use Cases


  - Software development

  - Research applications

  - Complex reasoning

  - General-purpose tasks

  - Multilingual applications


  ## Availability


  Open-source through 01.AI GitHub and community channels.


  ## Community


  Builds on the Yi model's strong reputation in the open-source community.
