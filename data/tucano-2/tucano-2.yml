name: Tucano 2
description: A family of open-source language models (0.5B–3.7B parameters)
  built from the ground up for Portuguese. Tucano 2 is fully open — including
  training data, code, recipes, and evaluation tools — and outperforms most
  prior Portuguese models of similar size. It includes base, instruct, and think
  variants trained via both from-scratch pretraining and continual pretraining
  on Qwen3.
