markdown: >-
  ## Overview


  Grok-3 was released by xAI (Elon Musk's AI company) on February 17, 2025.
  Designed to compete with the best proprietary models, it features advanced
  reasoning modes and real-time information retrieval.


  ## Architecture


  - **Context window**: 1 million tokens for managing massive conversations or
  documents

  - **Multimodal understanding**: Visual content analysis (tested on MMMU) and
  video content (EgoSchema)


  ## Reasoning Modes


  - **Think Mode**: Step-by-step problem-solving for math equations and project
  planning

  - **Big Brain Mode**: Extended reasoning for multi-step challenges requiring
  deep logic


  ## Features


  - **DeepSearch**: Pulls live data from the internet and X (formerly Twitter),
  actively browsing, cross-checking sources, and delivering real-time
  information

  - **Fast responses**: Delivers thoughtful, accurate answers even without deep
  reasoning modes

  - **Multimodal**: Handles image and video content for complex analysis


  ## Benchmark Performance


  - **AIME**: 96% on advanced math exams

  - **GPQA**: 84% on graduate-level science benchmarks

  - **Coding**: Nearly 80% success rate

  - **MMMU**: Image understanding

  - **EgoSchema**: Video content understanding


  ## Use Cases


  - Market research (real-time data gathering)

  - News analysis

  - Fact-checking

  - Technical lookups

  - Multi-step reasoning tasks

  - Image and video analysis


  ## Future Development


  - xAI is training even larger models using approximately 200,000 GPUs


  ## Limitations


  - Proprietary model

  - Big Brain mode may be slower than standard operation
