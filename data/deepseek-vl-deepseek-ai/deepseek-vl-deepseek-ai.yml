name: DeepSeek-VL (DeepSeek AI)
description: Open-source vision-language model family with compact sizes (1.3B
  and 4.5B parameters) using a Mixture of Experts architecture for efficiency.
  Combines a SigLIP-L vision encoder with DeepSeekMoE LLM, delivering strong
  reasoning capabilities particularly suited for scientific diagram analysis and
  technical vision tasks.
source_url: https://github.com/deepseek-ai/DeepSeek-VL
category: Multimodal Models
tags:
