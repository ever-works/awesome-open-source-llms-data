name: Ollama
description: Ollama is a user-friendly tool for running large language models
  locally on your machine with a simple command-line interface. It bundles model
  weights, handles quantization automatically, and provides an OpenAI-compatible
  API for easy integration. Supporting dozens of open models including LLaMA,
  Mistral, DeepSeek, and Phi families, it eliminates the complexity of setting
  up inference pipelines and serving endpoints locally.
