markdown: >-
  ## Overview

  MiMo-V2-Flash is an A-tier open-source large language model from Xiaomi, known
  for its balanced performance across various tasks.


  ## Features

  - **AIME 2025 Score:** 94.1.

  - **GPQA Diamond Score:** 83.7.

  - **Context Window:** 262K tokens.

  - **HumanEval Performance:** 84.8.


  ## Best for

  - Balanced coding and reasoning workloads

  - High-throughput production serving


  ## Benchmarks

  - MMLU: 86.7

  - MMLU-Pro: 84.9

  - HumanEval: 84.8

  - SWE-bench Verified: 73.4

  - LiveCodeBench: 80.6

  - AIME 2025: 94.1

  - GPQA Diamond: 83.7

  - Chatbot Arena: 1401
