name: Grok-1
description: Grok-1 is the original open-weight release of xAI's large language
  model with 314 billion parameters using a mixture-of-experts architecture. It
  was trained from scratch with a focus on truthful response generation and
  real-time knowledge, differentiating from traditional language model training.
  While primarily a release demonstration of xAI's capabilities, it is available
  under open license for research and exploration.
