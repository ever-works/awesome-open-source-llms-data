markdown: >-
  ## Overview


  Hermes 3 is Nous Research's latest generation of general-use language models,
  representing significant advancements in conversational AI, agentic
  capabilities, and function-calling. Built on LLaMA and LLaMA 2 architectures,
  Hermes 3 excels at long-term context retention, complex multi-turn
  conversations, and sophisticated roleplaying scenarios.


  ## Architecture


  - **Base Models:** LLaMA and LLaMA 2

  - **Model Sizes:** Multiple variants (7B, 13B, 34B, 70B, and larger)

  - **Training Focus:** Conversation, function-calling, and agentic behavior

  - **Design:** General-purpose with specialized capabilities


  ## Key Features


  - Advanced long-term context retention

  - Sophisticated multi-turn conversation capability

  - Complex roleplaying and character consistency

  - Internal monologue abilities

  - Enhanced agentic function-calling

  - Tool use and API integration

  - Neutral, unbiased general-use design


  ## Core Capabilities


  ### Long-Term Context Retention

  - Maintains context across extended conversations

  - Remembers details from earlier in dialogue

  - Coherent narrative consistency

  - Effective information tracking


  ### Multi-Turn Conversations

  - Natural dialogue flow

  - Context-aware responses

  - Appropriate tone and style adaptation

  - Conversation history understanding


  ### Complex Roleplaying

  - Character consistency and development

  - Internal monologue capabilities

  - Nuanced personality expression

  - Creative narrative generation


  ### Agentic Function-Calling

  - Enhanced tool use capabilities

  - API integration and calling

  - Multi-step task execution

  - Structured output generation


  ## Hermes Model Evolution


  ### Hermes 1.0 (Original)

  - Based on LLaMA

  - General-purpose capabilities

  - Foundation for series


  ### Hermes 2.0

  - Improved instruction following

  - Enhanced conversational abilities

  - Better general performance

  - Multiple size variants


  ### Hermes 3.0 (Latest)

  - Long-term context retention

  - Advanced agentic capabilities

  - Internal monologue features

  - Enhanced function-calling


  ## Model Variants


  ### Hermes 2 Yi 34B

  - Built on Yi-34B base

  - Trained on 1,000,000 entries

  - High-quality dataset curation

  - Significant performance improvements

  - Excellent benchmark results


  ### Hermes 2 Vision (Multimodal)

  - Vision-language capabilities

  - Based on OpenHermes-2.5-Mistral-7B

  - Pioneering multimodal integration

  - Image understanding


  ### Various Size Options

  - 7B: Efficient deployment

  - 13B: Good balance

  - 34B: Enhanced capabilities (Yi-based)

  - 70B: Maximum performance


  ## Training Methodology


  ### High-Quality Data

  - Hermes 2 Yi trained on 1M entries

  - Curated from open datasets

  - Emphasis on quality over quantity

  - Diverse task coverage


  ### Specialized Training

  - Function-calling data

  - Conversational datasets

  - Roleplaying scenarios

  - Agentic task examples


  ## Function-Calling Excellence


  ### Tool Use

  - Natural language to API calls

  - Structured output generation

  - Multi-step tool orchestration

  - Error handling and recovery


  ### Integration Capabilities

  - External API integration

  - Database queries

  - Web searches

  - Custom function definitions


  ## Deployment Options


  - Self-hosting on appropriate GPU infrastructure

  - Available through Ollama (`ollama run nous-hermes`)

  - HuggingFace model hub

  - Cloud deployment options

  - Compatible with standard frameworks

  - Quantization support for efficiency


