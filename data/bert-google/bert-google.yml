markdown: >-
  ## Overview


  BERT (Bidirectional Encoder Representations from Transformers) was introduced
  by Google in 2018. Unlike generative LLMs, BERT is a transformer-based model
  that processes sequences of data to produce contextual embeddings.


  ## Architecture


  - Stack of transformer encoders

  - 342 million parameters

  - Pre-trained on a large corpus of text

  - Bidirectional context understanding (processes text left-to-right and
  right-to-left simultaneously)


  ## Key Features


  - Contextual embeddings for downstream tasks

  - Fine-tuning for specific NLP tasks

  - Natural language inference

  - Sentence text similarity

  - Improved query understanding in Google Search (2019)


  ## Use Cases


  - Text classification

  - Named entity recognition

  - Question answering

  - Sentence similarity

  - Search query understanding


  ## Legacy


  BERT remains widely used in research and production systems, though it has
  been superseded by more advanced generative transformer models for many tasks.
