name: BERT (Google)
description: BERT (Bidirectional Encoder Representations from Transformers) is
  Google's foundational transformer-based language model that revolutionized NLP
  through bidirectional pre-training and mask language modeling. Though not a
  generative LLM, it remains the basis for countless downstream models in
  classification, NER, and semantic search tasks. With over 100B downloads on
  Hugging Face, it continues to be the most widely used language model in
  production systems worldwide.
