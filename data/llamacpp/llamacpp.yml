name: llama.cpp
description: llama.cpp is a high-performance C++ inference engine for running
  LLMs efficiently on consumer hardware, including CPUs and GPUs without
  specialized AI accelerators. It introduced the GGUF quantization format,
  enabling 4-bit and 8-bit quantized models that run with minimal memory
  overhead. It's the most popular choice for local model inference on Mac,
  Linux, and embedded devices, supporting GGUF models from hundreds of
  organizations.
