markdown: >-
  ## Overview


  StarCoder is a 15.5B parameter code generation model from the BigCode Project,
  an open scientific collaboration led by Hugging Face and ServiceNow. Trained
  on 80+ programming languages from The Stack dataset.


  ## Model Variants


  ### StarCoderBase

  - **Parameters**: 15.5B

  - **Training Data**: 1 trillion tokens from The Stack

  - **Languages**: 80+ programming languages

  - **Context Length**: 8K tokens


  ### StarCoder

  - **Base**: StarCoderBase

  - **Additional Training**: 35B Python tokens

  - **Specialization**: Enhanced Python capabilities


  ### StarCoder2 (Next Generation)

  - **3B parameters**: Compact variant

  - **7B parameters**: Mid-size model

  - **15B parameters**: Full-size model

  - **Training**: 3.3 to 4.3 trillion tokens


  ## Performance


  **StarCoderBase**: Outperforms existing open Code LLMs on popular programming
  benchmarks and matches or surpasses closed models such as code-cushman-001
  from OpenAI.


  **StarCoder (Python)**: A specialized prompt significantly increased the
  HumanEval score from 34% to over 40%, setting a new state-of-the-art result
  for open models.


  **StarCoder2-3B**: Despite its small size, outperforms other Code LLMs of
  similar size on most benchmarks, and also outperforms StarCoderBase-15B.


  ## Key Features


  - **Multi-Language Support**: 80+ programming languages

  - **Long Context**: 8K token context window

  - **Infilling**: Fill-in-the-middle code completion

  - **Fast Inference**: Multi-query attention for efficient batching

  - **Open Training Data**: The Stack with opt-out process

  - **Permissive License**: Commercial use allowed


  ## Technical Features


  **Multi-Query Attention**: Enables fast large-batch inference with reduced
  memory requirements.


  **Infilling Capabilities**: Can complete code in the middle of existing code,
  not just at the end.


  **Long Context**: 8K tokens allows understanding of larger codebases.


  ## Supported Languages


  Includes but not limited to:

  - Python, JavaScript, TypeScript

  - Java, C, C++, C#

  - Go, Rust, Swift, Kotlin

  - PHP, Ruby, Shell

  - SQL, HTML, CSS

  - And 60+ more languages


  ## Training Dataset: The Stack


  - **Size**: 1+ trillion tokens

  - **Source**: Permissively licensed GitHub repositories

  - **Languages**: 80+ programming languages

  - **Tools**: Inspection tools and opt-out process

  - **Ethics**: Responsible data collection


  ## Use Cases


  - Code completion and generation

  - Code explanation and documentation

  - Bug detection and fixing

  - Code translation between languages

  - Learning programming

  - Development assistance


  ## BigCode Project


  StarCoder is part of the BigCode Project's mission:

  - Responsible development of code LLMs

  - Open science and transparency

  - Community collaboration

  - Ethical AI development


  ## Licensing


  Released under BigCode OpenRAIL-M license, allowing commercial use with
  responsible AI provisions.


  ## Pricing


  Free and open-source.
