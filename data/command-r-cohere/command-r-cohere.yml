markdown: >-
  ## Overview


  Command R is Cohere's advanced language model specifically optimized for
  retrieval-augmented generation (RAG) applications, enterprise conversational
  AI, and long-context understanding. Designed with production deployments in
  mind, Command R excels at combining external knowledge with its internal
  capabilities for accurate, grounded responses.


  ## Architecture


  - **Model Type:** Transformer-based language model

  - **Optimization:** RAG and conversational tasks

  - **Context Length:** Extended for enterprise applications

  - **Design:** Production-ready for business use


  ## Key Features


  - Optimized for retrieval-augmented generation

  - Strong conversational capabilities

  - Extended context window

  - Enterprise-grade reliability

  - Tool use and function calling

  - Multi-turn dialogue excellence

  - Grounding in retrieved information

  - Instruction following


