name: Together AI
description: Together AI is a cloud platform and API provider that serves
  open-source LLMs with a developer-friendly interface and competitive pricing.
  They maintain a comprehensive model collection spanning LLaMA, Mistral, Qwen,
  DeepSeek, and fine-tuned community models with automatic scaling. The platform
  offers fine-tuning capabilities, embedding models, and image generation APIs,
  positioning itself as the most comprehensive open-source model serving
  platform.
