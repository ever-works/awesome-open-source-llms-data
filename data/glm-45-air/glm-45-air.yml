markdown: >-
  ## Overview


  GLM-4.5-Air is an open-source Mixture-of-Experts language model released by
  Zhipu AI (知谱 AI) in July 2025. It complements the larger GLM-4.5 (355B) model
  as a lighter, more efficient variant.


  ## Architecture


  - **Type**: Mixture-of-Experts (MoE)

  - **Total Parameters**: 106 billion

  - **Active Parameters per Query**: A fraction of total parameters (MoE
  routing)

  - **License**: Open-source


  ## Capabilities


  - Bilingual (Chinese/English) text generation and understanding

  - Code generation and reasoning

  - Instruction following

  - Efficient inference due to sparse activation of expert sub-networks


  ## Release


  - Announced: July 2025

  - Released alongside GLM-4.5 (355B) as part of Zhipu AI's expanding GLM family

  - Made available for download on Hugging Face and Zhipu AI's open model
  repositories


  ## Context


  Zhipu AI, a spinout from Tsinghua University, has a long history of
  open-source Chinese language models dating back to the original GLM-6B and
  ChatGLM series. GLM-4.5-Air represents the company's continued commitment to
  open-source AI at scale.
