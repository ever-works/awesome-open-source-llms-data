markdown: >-
  ## Overview


  gpt-oss represents OpenAI's venture into open large language models,
  specifically focusing on reasoning capabilities. These models are available in
  two primary sizes: gpt-oss-20b (21 billion parameters) and gpt-oss-120b (117
  billion parameters, utilizing a mixture-of-experts architecture). They are
  developed using the same advanced training techniques as OpenAI's proprietary
  models like o3 and GPT-4o.


  ## Features


  - **Open Availability:** Can be downloaded, fine-tuned, and used for various
  purposes.

  - **Reasoning Capabilities:** Designed to excel in complex problem-solving by
  breaking down tasks into manageable steps.

  - **Mixture-of-Experts (MoE) Architecture:** The 120b version utilizes MoE for
  enhanced performance and efficiency.

  - **State-of-the-Art Training:** Benefits from the latest advancements in
  OpenAI's model development.


  ## Access


  These models are openly accessible, allowing developers and researchers to
  integrate them into their own applications and conduct further research.
  OpenAI has implemented measures to mitigate potential misuse.


  ## Pricing


  As open models, gpt-oss is generally free to use, though deployment and
  operational costs for running the models on personal infrastructure would
  apply.
