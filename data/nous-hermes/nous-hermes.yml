markdown: >-
  ## Overview


  Nous Hermes is a series of state-of-the-art instruction-tuned language models
  from Nous Research, known for strong reasoning capabilities, long-form
  outputs, and excellent instruction-following.


  ## Model Variants


  ### Nous Hermes 2 - Mixtral 8x7B

  - **Base**: Mixtral 8x7B MoE

  - **DPO Training**: Direct Preference Optimization

  - **Performance**: Top-tier instruction-following

  - **Context**: Extended context support


  ### Nous Hermes 2 - Llama 2 (Multiple Sizes)

  - **7B**: Efficient deployment

  - **13B**: Balanced performance

  - **70B**: Maximum capability


  ### Nous Hermes 2 - Yi 34B

  - **Base**: Yi 34B model

  - **Features**: Strong multilingual and reasoning

  - **Context**: Long-context capable


  ### Nous Hermes - Llama 2

  - Original series based on Llama 2

  - Various sizes and optimizations


  ## Key Features


  - **Strong Reasoning**: Excellent logical capabilities

  - **Long-Form Output**: Detailed, comprehensive responses

  - **DPO Training**: Advanced alignment technique

  - **Multiple Bases**: Mixtral, Llama, Yi foundations

  - **Instruction Excellence**: Top-tier command following

  - **Open Source**: Freely available


  ## Training Methodology


  ### Direct Preference Optimization (DPO)

  - More stable than RLHF

  - Efficient preference learning

  - Better alignment with human preferences

  - High-quality outputs


  ### High-Quality Data

  - Curated instruction datasets

  - Long-form response training

  - Reasoning-focused examples

  - Diverse task coverage


  ## Performance Highlights


  **Reasoning**:

  - Excellent logical reasoning

  - Multi-step problem-solving

  - Complex instruction handling

  - Chain-of-thought capabilities


  **Long-Form Generation**:

  - Detailed explanations

  - Comprehensive responses

  - Coherent long outputs

  - Structured information


  **Instruction-Following**:

  - Precise task execution

  - Nuanced understanding

  - Format compliance

  - Context retention


