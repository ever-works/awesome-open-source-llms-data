markdown: >-
  ## Overview

  GLM-4.7 (Thinking) is an open-source large language model developed by Z AI,
  known for its robust performance in thinking and coding tasks. It secured a
  top spot in February 2026 rankings.


  ## Key Features

  - **Cognitive Capabilities:** Achieves a Quality Index of 41.78, reflecting
  strong cognitive and reasoning abilities.

  - **Coding Proficiency:** Scores 89% on LiveCodeBench, making it a highly
  effective model for code generation and analysis.

  - **Extensive Context:** Supports a 200K token context window, enabling it to
  handle complex and lengthy inputs.


  ## Performance

  - **Quality Index:** 41.78

  - **LiveCodeBench:** 89%

  - **AIME 2025:** 95%

  - **MMLU-Pro:** 86%


  ## Licensing

  GLM-4.7 (Thinking) is released under an open license, facilitating its use for
  self-hosting, fine-tuning, and commercial deployment.
