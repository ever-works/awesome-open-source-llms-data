markdown: >-
  ## Overview


  Jamba 1.5 is AI21 Labs' latest advancement in efficient language models,
  featuring a revolutionary hybrid SSM-Transformer architecture. Designed for
  enterprise applications requiring long-context understanding and maximum
  efficiency.


  ## Architecture Innovation


  - **Hybrid Design**: Combines Mamba SSM with Transformer layers

  - **MoE Layers**: Mixture-of-Experts for selective activation

  - **Total Parameters**: 52 billion

  - **Active Parameters**: Only 12 billion per forward pass

  - **Efficiency**: MoE enables dramatic activation reduction


  ## Context & Performance


  - Context Window: 256,000 tokens (handles lengthy documents)

  - Throughput: 3x improvement on long contexts

  - Quality: Maintains top performance across tasks

  - Speed: Fastest processing on market for long sequences


  ## Key Capabilities


  - Document processing and analysis

  - Knowledge base search

  - Financial records review

  - Contract analysis

  - Long-form content generation

  - Knowledge extraction


  ## Model Variants


  - **Jamba 1.5 Mini**: Smaller variant for edge deployment

  - **Jamba 1.5 Large**: Full-capacity variant for complex tasks


  ## Licensing


  - Open weights available

  - Jamba Open Model License

  - Apache 2.0 compatible

  - Commercial and research use


  ## Enterprise Use Cases


  - Financial document analysis

  - Legal contract review

  - Knowledge management systems

  - RAG and semantic search

  - Long-context document understanding

  - Content summarization


  ## Deployment


  - Self-hosted deployment support

  - Cloud-compatible architecture

  - Quantization-friendly

  - Enterprise-grade reliability
