markdown: >-
  ## Overview


  Llama Nemotron Ultra is NVIDIA's open-weight large language model, combining
  the Llama architecture with NVIDIA's Nemotron training techniques.


  ## Benchmark Performance


  - **Quality Index**: 38

  - **LiveCodeBench**: 64%

  - **AIME 2025**: 64%

  - **MMLU-Pro**: 83%


  ## Features


  - Built on the Llama architecture enhanced with NVIDIA's Nemotron training
  pipeline

  - Optimized for deployment on NVIDIA GPU infrastructure

  - Open weights with commercial use permitted

  - Enterprise-focused capabilities


  ## Pricing


  Free to download and use. Check specific license for fine-tuning and
  redistribution terms.
