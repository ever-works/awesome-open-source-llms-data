name: Qwen2 72B
description: Qwen2 72B is a 72B-parameter instruction-tuned language model from
  Alibaba, trained on over 7 trillion tokens with exceptional multilingual and
  code capabilities. It features a 128K context window, strong mathematical
  reasoning, and comprehensive tool-use and function-calling support. The model
  achieved state-of-the-art open-source results across multiple benchmarks,
  competing with LLaMA 3 405B despite having 30x fewer parameters.
