name: DeepSeek Coder V2
description: DeepSeek Coder V2 is a 16B-parameter code generation model
  available in both base and instruction-tuned variants, trained on trillions of
  tokens of code spanning 338 programming languages. It features multi-stage
  pre-training, fill-in-the-middle support, and strong performance on HumanEval
  and MBPP benchmarks. The model outperforms general-purpose models of similar
  size on coding tasks and rivals specialized competitors like CodeLlama-70B,
  making it well-suited for IDE integrations, code review, and automated
  refactoring pipelines.
