markdown: >-
  ## Overview


  DeepSeek Coder V2 is a specialist model from the DeepSeek-V2 family,
  specifically fine-tuned for code generation, completion, and reasoning. It
  supports over 300 programming languages and has demonstrated state-of-the-art
  performance on coding benchmarks.


  ## Architecture


  - MoE architecture with 236B total parameters and 21B active parameters per
  token

  - 128k context window

  - Efficient token compute through mixture-of-experts routing


  ## Key Features


  - Supports over 300 programming languages

  - State-of-the-art performance on coding benchmarks (HumanEval, MBPP)

  - Optimized for code generation, completion, and reasoning tasks

  - Efficient inference with only 21B active parameters per forward pass

  - Multiple quantization options available (4-bit, 8-bit GGUF)


  ## Use Cases


  - Developer assistants and IDE integrations

  - Automated code generation and refactoring pipelines

  - Code review and explanation

  - Multi-language codebases support


  ## Deployment


  - Ollama: `ollama run deepseek-coder-v2`

  - VRAM requirements: ~16 GB (4-bit), ~25 GB (8-bit)

  - Compatible with vLLM, SGLang, and LMDeploy


  ## Licensing


  Licensed under DeepSeek Model License 2.0, which is permissive for both
  commercial and research use, requiring attribution.


  ## Limitations


  While exceptional at coding tasks, its general reasoning capabilities are not
  as strong as the base DeepSeek-V2 model. It is recommended for code-centric
  applications rather than general-purpose chat or reasoning.
