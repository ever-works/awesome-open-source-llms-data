markdown: >-
  ## Overview


  DeepSeek's V3 series (codename 'Terminus') builds on the R1 models and is
  designed for agentic AI workloads. It uses a Mixture-of-Experts transformer
  with ~671B total parameters and ~37B active parameters per token. V3.2
  achieves reasoning performance comparable to leading proprietary models on
  public benchmarks.


  ## Architecture


  - **Type**: MoE transformer with DeepSeek Sparse Attention (DSA)

  - **Total Parameters**: ~671B

  - **Active Parameters**: ~37B per token

  - **Context Length**: Up to ~1M tokens with sparse attention

  - **License**: MIT


  ## Sparse Attention Mechanism


  The Sparse Attention architecture replaces full attention with an
  indexer-selector mechanism, reducing quadratic attention cost while
  maintaining accuracy close to dense attention:

  - **Multi-Query Attention** combined with a **Lightning Indexer** and **Top-K
  Selector**

  - The indexer identifies relevant tokens

  - Attention is computed only over the selected subset

  - RoPE applied for positional encoding


  ## Training


  - Trained with large-scale reinforcement learning on math, coding, logic, and
  tool use tasks

  - Uses Group Relative Policy Optimization (GRPO)

  - Skills integrated into a shared model


  ## Variants


  - **V3.2**: Standard version for reasoning and agent tasks

  - **V3.2-Speciale**: Further optimized for deep multi-step reasoning


  ## Features


  - Built-in support for thinking modes

  - Combined tool/chain-of-thought workflows

  - Production API access via DeepSeek.ai

  - Outperforms V3.1 on mixed reasoning and agent tasks


  ## Strengths


  - State-of-the-art open reasoning: consistently ranks at the top of
  open-source reasoning and agent tasks

  - Efficient long-context inference: DSA reduces cost growth on very long
  sequences without significantly hurting accuracy

  - Agent integration: built-in thinking modes and tool/chain-of-thought
  workflows

  - Open ecosystem: MIT license and API access via web/app ecosystem


  ## Weaknesses


  - Large compute footprint: overall model size and training cost remain
  significant for self-hosting

  - Complex tooling: advanced thinking modes and full agent workflows require
  expertise to integrate

  - Relatively recent generation: broader community benchmarks and tooling
  continue to mature


  ## Availability


  Open weights available + production API via DeepSeek.ai.
