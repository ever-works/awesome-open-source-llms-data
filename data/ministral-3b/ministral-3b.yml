markdown: >-
  ## Overview


  Ministral 3B is Mistral AI's smallest model in the Ministral 3 family,
  optimized for minimal resource consumption without sacrificing capability.


  ## Model Architecture


  - **Parameters**: 3 billion

  - **Type**: Dense, not sparse

  - **Context**: Extended support

  - **Modality**: Native multimodal


  ## Variants


  - **Base**: Foundation model

  - **Instruct**: Chat-optimized

  - **Reasoning**: Extended thinking


  ## Capabilities


  - Vision understanding

  - Multilingual support

  - Function calling

  - Reasonable reasoning


  ## Deployment


  - Smartphones and tablets

  - Edge devices

  - Real-time inference

  - Battery-efficient

  - Minimal overhead


  ## Licensing


  Apache 2.0 licensed for unrestricted use.
