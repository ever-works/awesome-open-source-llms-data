markdown: >-
  ## Overview


  BGE-M3 is a text embedding model from the BGE (BAAI General Embedding) family
  developed by the Beijing Academy of Artificial Intelligence (BAAI). It stands
  out for its multi-functionality, multi-linguality, and multi-granularity (M3)
  capabilities, making it one of the most versatile embedding models available.


  ## Features


  - **Multi-functionality**: Simultaneously performs dense, multi-vector, and
  sparse retrieval in a single model

  - **Multi-linguality**: Supports more than 100 working languages, learning a
  common semantic space for both multilingual and crosslingual retrieval

  - **Multi-granularity**: Processes inputs ranging from short sentences to long
  documents of up to 8192 tokens

  - **Benchmark performance**: Performs well on benchmark datasets for
  multilingual retrieval tasks


  ## Ecosystem


  - Part of the broader BGE family

  - English-only alternatives include bge-base-en-v1.5 and bge-en-icl


  ## Usage Considerations


  - Real-world dataset effectiveness needs further testing beyond benchmarks

  - Processing very lengthy documents may pose computational resource and
  efficiency challenges

  - Performance may vary across different language families and linguistic
  features


  ## Deployment


  - Available on Hugging Face

  - Can be deployed using BentoML for scalable inference
