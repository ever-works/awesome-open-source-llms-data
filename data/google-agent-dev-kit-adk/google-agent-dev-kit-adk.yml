markdown: >-
  ## Overview


  The Google Agent Dev Kit (ADK) was announced in April 2025 and has grown to
  17,800 GitHub stars with 3.3 million monthly downloads. This modular framework
  integrates deeply with the Google ecosystem, including Gemini and Vertex AI.


  ## ADK Features


  - Modular framework with Google ecosystem integration (Gemini, Vertex AI)

  - Support for hierarchical agent compositions

  - Custom tool development capabilities

  - Efficient development requiring less than 100 lines of code


  ## Use Cases


  - Google uses ADK in their Agentspace platform

  - Customer engagement solutions

  - Google Cloud workflow automation


  ## Trade-offs


  The framework has a moderate to steep learning curve due to Google Cloud
  integration requirements. It is well-suited for teams already operating within
  the Google Cloud platform.


  ## Best For


  Google Cloud-based applications and teams building customer engagement
  solutions within Google's ecosystem.
