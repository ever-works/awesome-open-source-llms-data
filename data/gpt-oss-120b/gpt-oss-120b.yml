markdown: >-
  ## Overview

  GPT-oss 120B is OpenAI's seminal open-weight release since GPT-2, marking a
  significant contribution to the open-source LLM landscape.


  ## Features

  - **MMLU-Pro Score:** 90.0 (highest on the entire leaderboard).

  - **GPQA Diamond Score:** 80.9, indicating strong scientific understanding.

  - **License:** Apache 2.0 license, highly commercially permissive.


  ## Best for

  - General knowledge applications

  - Scientific Q&A

  - Teams that prefer OpenAI-origin models with open licensing


  ## Benchmarks

  - MMLU: 90.0

  - MMLU-Pro: 90.0

  - SWE-bench Verified: 62.4

  - LiveCodeBench: 60.0

  - GPQA Diamond: 80.9

  - Chatbot Arena: 1354
