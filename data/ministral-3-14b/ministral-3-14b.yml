markdown: >-
  ## Overview


  Ministral 3 14B represents the high end of efficient models, delivering
  frontier performance for its 14B parameter count.


  ## Architecture


  - **Parameters**: 14 billion

  - **Type**: Dense model

  - **Modality**: Native multimodal

  - **Context**: Extended support


  ## Performance Highlights


  - Best cost-to-performance ratio

  - 85% on AIME 2025 (reasoning variant)

  - Matches larger models

  - State-of-the-art for size


  ## Variants


  - **Base**: Foundation model

  - **Instruct**: Dialogue-optimized

  - **Reasoning**: Extended chain of thought


  ## Capabilities


  - Advanced reasoning

  - Image understanding

  - Multilingual support

  - Complex problem-solving

  - Strong instruction-following


  ## Deployment


  - Single GPU inference (24GB)

  - Quantization support

  - Cloud and edge

  - Production-ready


  ## Use Cases


  - Enterprise deployment

  - Research applications

  - Complex reasoning

  - Production systems


  ## Licensing


  Apache 2.0 licensed for unrestricted use.
