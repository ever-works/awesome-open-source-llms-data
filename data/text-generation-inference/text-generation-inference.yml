name: Text Generation Inference
description: Text Generation Inference (TGI) is Hugging Face's production-ready
  inference framework for deploying large language models at scale with
  optimized throughput. Features include tensor parallelism, continuous
  batching, quantization support, and built-in OpenAI-compatible API server.
  It's the go-to deployment solution for enterprises serving open-source LLMs,
  offering GPU utilization comparable to proprietary serving systems and native
  integration with Hugging Face models.
