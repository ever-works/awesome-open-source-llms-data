name: Tülu 3
description: Tülu 3 is the Allen Institute for AI's latest instruction-tuned
  language model, built by fine-tuning LLaMA base models with extensive
  supervised fine-tuning and preference optimization. It achieves competitive
  performance with proprietary models on instruction-following and reasoning
  benchmarks through rigorous alignment training. Released as fully open weights
  with transparent training data and methodology, making it a gold standard for
  reproducible AI research.
