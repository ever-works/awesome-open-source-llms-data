markdown: >-
  ## Overview

  Nemotron Nano 30B is part of Nvidia's Nemotron series, offering strong
  benchmark performance at much smaller parameter counts, making it ideal for
  deployment on constrained hardware.


  ## Features

  - **MMLU-Pro Score:** 78.1.

  - **Context Window:** 1M tokens (joint-longest on the board alongside Llama 4
  Maverick).


  ## Best for

  - Edge deployment

  - Resource-constrained environments


  ## Benchmarks

  - MMLU-Pro: 78.1
